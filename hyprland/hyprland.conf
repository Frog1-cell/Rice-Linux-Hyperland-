########################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
########################################################################################

################
### MONITORS ###
################
monitor = eDP-1,2560x1600@60,0x0,1.6
monitor = DP-2,1920x1080@60,1600x0,1.25

####################
### WORKSPACES  ###
####################
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1
workspace = 11, monitor:DP-1
workspace = 12, monitor:DP-1
workspace = 13, monitor:DP-1
workspace = 14, monitor:DP-1
workspace = 15, monitor:DP-1
workspace = 16, monitor:DP-1
workspace = 17, monitor:DP-1
workspace = 18, monitor:DP-1
workspace = 19, monitor:DP-1
workspace = 20, monitor:DP-2

###################
### MY PROGRAMS ###
###################
$terminal = alacritty
$fileManager = dolphin
$menu = hyprlauncher

#################
### AUTOSTART ###
#################
exec-once = swww-daemon
exec-once = swww img 'Изображения/ми-фу.png'
source = ~/.config/Ax-Shell/config/hypr/ax-shell.conf

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Twilight-cursors

###################
### LOOK & FEEL ###
###################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.inactive_border = 0x595959aa
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}
source = ~/.config/hypr/border.conf

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 0.9
    inactive_opacity = 0.9
    shadow {
        enabled = true
        range = 1
        render_power = 1
        color = 0x1a1a1aee
    }
    blur {
        enabled = true
        size = 1
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = snappy, 0.05, 0.9, 0.1, 1.1      
    bezier = aggressive, 0.3, 1.2, 0.4, 1.0   
    bezier = bold, 0.1, 1.3, 0.3, 1.0         
    bezier = smooth, 0.25, 1, 0.5, 1

    animation = windows, 1, 6, snappy, popin 90%
    animation = windowsIn, 1, 5, aggressive, popin 85%
    animation = windowsOut, 1, 4, snappy, popin 80%
    animation = border, 1, 6, bold
    animation = fade, 1, 4, smooth
    animation = workspaces, 1, 6, snappy, slidefade
    animation = workspacesIn, 1, 5, aggressive, slidefade
    animation = workspacesOut, 1, 4, snappy, slidefade
    animation = layers, 1, 4, bold
    animation = layersIn, 1, 3, aggressive, fade
    animation = layersOut, 1, 3, snappy, fade
    animation = zoomFactor, 1, 7, aggressive
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############
input {
    kb_layout = us,ru,ee
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = SUPER, D, exec, rofi -show drun -theme ~/.config/rofi/themes/current.rasi
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, left, workspace, -1
bind = $mainMod, right, workspace, +1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod SHIFT, E, exit
bind = SUPER, SPACE, exec, hyprctl switchxkblayout keyboard next
bind = SUPER, M, exit
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = $mainMod, F, togglefloating
bind = SUPER, P, exec, ~/.config/toggle-wallpaper.sh

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
